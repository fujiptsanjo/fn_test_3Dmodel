<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden">
    <a-scene embedded arjs vr-mode-ui="enabled: false">
      <a-assets>
        <a-asset-item id="fn_tc1" src="fn_tc1.glb"></a-asset-item>
      </a-assets>
      
      <a-marker type="pattern" url="pattern-fn_mkr.patt">
        <a-entity gltf-model="#fn_tc1" rotation="180 0 0" scale="0.05 0.05 0.05"></a-entity>
      </a-marker>
      
      <a-entity camera position="0 0 3"></a-entity>
    </a-scene>
  </body>
  <script>
      document.querySelector("a-scene").renderer.gammaOutput=true;
  </script>
</html>
